  - slug: mourning-conversations
    title: Mourning Conversations
    image: https://content.urn1350.co.uk/Podcasts/images/mourning-conversations.jpg
    host: Lily Moreto
    description: >
      The show includes talks about sensitive topics, so… trigger warning: death, suicide, mental health. Little bit about me: Hiya! I am Lily, and this show is about how I am dealing with the loss of my father. This podcast will include all the nitty-gritty, awkward and weird parts of the whole journey. I hope to be someone that people can relate to in such a difficult time. This is my first time really going public about it all, so please be patient with me! I am grateful to all of you who listen. Lots of luv, Lily xo
    instagram: "@mourningconversations"
    spotifyEmbed: "https://open.spotify.com/show/1HpAxHolcogmiOwHnETxC5?si%3D670b29efc46d4406&sa=D&source=editors&ust=1774107180877159&usg=AOvVaw31n41KJlw5fDsrXiVexfnH"
