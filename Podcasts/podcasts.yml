  - slug: mourning-conversations
    title: Mourning Conversations
    image: https://content.urn1350.co.uk/Podcasts/images/mourning-conversations.jpg
    host: Lily Moreto
    description: >
      The show includes talks about sensitive topics, so trigger warning: death, suicide,
      and mental health. Hiya! I am Lily, and this show is about how I am dealing with
      the loss of my father. This podcast includes the awkward and weird parts of the
      whole journey. I hope to be someone people can relate to in such a difficult time.
      This is my first time really going public about it all, so please be patient with me.
      I am grateful to all of you who listen. Lots of luv, Lily xo.
    instagram: "@mourningconversations"
    instagramlink: "https://www.instagram.com/mourningconversations/"
    guests: ""
    spotifyEmbed: "https://open.spotify.com/embed/show/1HpAxHolcogmiOwHnETxC5"
